<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Supernova Database</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#111;
            color:white;
            margin:0;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#cccccc;
        }

        .download-all{
            text-align:center;
            margin:25px 0;
        }

        .download-all a{
            background:#2979ff;
            color:white;
            padding:12px 20px;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
            background:#1e1e1e;
            border-radius:10px;
            overflow:hidden;
        }

        th{
            background:#222;
            padding:14px;
            text-align:left;
        }

        td{
            padding:12px 14px;
            border-top:1px solid #333;
        }

        tr:hover{
            background:#2a2a2a;
        }

        a{
            color:#4da3ff;
            text-decoration:none;
            font-weight:bold;
        }

        .downloads a{
            margin-right:12px;
        }

        @media(max-width:900px){

            body{
                padding:10px;
            }

            table{
                font-size:13px;
            }

        }

    </style>

</head>

<body>

    <h1>Supernova Database</h1>

    <p>
        Public light curves and photometric data products.
    </p>

    <div class="download-all">
        <a href="public/files/all_supernova_data.csv" download>
            Download All Data as CSV
        </a>
    </div>

            <tr>

                <th>RA</th>
                <th>Dec</th>
